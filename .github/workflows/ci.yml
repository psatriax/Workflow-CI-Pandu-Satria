name: MLflow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-model:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLProject

    env:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify files
        run: |
          pwd
          ls -lah

      - name: Run modelling via MLflow Project
        run: mlflow run . -e train --env-manager=local --experiment-name "Stroke Prediction"

      - name: Run tuning via MLflow Project
        run: mlflow run . -e tuning --env-manager=local --experiment-name "Stroke Prediction"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            MLProject/*.pkl
            MLProject/mlruns/**
            MLProject/mlflow.db